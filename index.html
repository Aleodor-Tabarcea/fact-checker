<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>RIFACTS — Fact Checker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --ri-bg: #F7F8FA;
      --ri-surface: #FFFFFF;
      --ri-border: #E2E5EA;
      --ri-text: #1A1D23;
      --ri-text-secondary: #5F6672;
      --ri-accent: #1D4ED8;
      --ri-accent-hover: #1E40AF;
      --ri-accent-light: #EFF6FF;
      --ri-positive: #059669;
      --ri-positive-bg: #ECFDF5;
      --ri-warning: #D97706;
      --ri-warning-bg: #FFFBEB;
      --ri-negative: #DC2626;
      --ri-negative-bg: #FEF2F2;
      --ri-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --ri-shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
      --ri-radius: 10px;
      --ri-radius-sm: 6px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--ri-bg);
      color: var(--ri-text);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 16px;
      gap: 14px;
    }

    /* ── Brand Header ── */
    .brand-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      border-radius: var(--ri-radius);
      box-shadow: var(--ri-shadow-md);
    }

    .brand-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 800;
      color: #F8FAFC;
      letter-spacing: 1.5px;
      line-height: 1.2;
    }

    .brand-name span {
      color: #60A5FA;
    }

    .brand-tagline {
      font-size: 10px;
      font-weight: 500;
      color: #94A3B8;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Section ── */
    .section {
      background: var(--ri-surface);
      border: 1px solid var(--ri-border);
      border-radius: var(--ri-radius);
      overflow: hidden;
      box-shadow: var(--ri-shadow-sm);
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--ri-text-secondary);
      padding: 12px 14px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-label::before {
      content: '';
      width: 3px;
      height: 12px;
      background: var(--ri-accent);
      border-radius: 2px;
    }

    /* ── Folder Search ── */
    .search-wrap {
      position: relative;
      padding: 0 14px 12px;
    }

    .search-input {
      width: 100%;
      padding: 10px 12px 10px 32px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--ri-text);
      background: var(--ri-bg);
      border: 1.5px solid var(--ri-border);
      border-radius: var(--ri-radius-sm);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-input::placeholder {
      color: #94A3B8;
      font-weight: 400;
    }

    .search-input:focus {
      border-color: var(--ri-accent);
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.12);
    }

    .search-icon {
      position: absolute;
      left: 24px;
      top: 11px;
      font-size: 13px;
      color: #94A3B8;
      pointer-events: none;
    }

    .search-results {
      display: none;
      border-top: 1px solid var(--ri-border);
      max-height: 180px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--ri-border) transparent;
    }

    .search-results.active {
      display: block;
    }

    .search-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.12s ease;
      border-bottom: 1px solid #F1F3F5;
    }

    .search-item:last-child {
      border-bottom: none;
    }

    .search-item:hover {
      background: var(--ri-accent-light);
    }

    .search-item-icon {
      font-size: 13px;
      flex-shrink: 0;
    }

    .search-item-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--ri-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .search-hint {
      padding: 14px;
      text-align: center;
      font-size: 11px;
      color: #94A3B8;
    }

    .search-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      font-size: 12px;
      color: var(--ri-text-secondary);
    }

    .mini-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--ri-border);
      border-top-color: var(--ri-accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Selected Folder Chip ── */
    .selected-chip {
      display: none;
      align-items: center;
      gap: 8px;
      margin: 0 14px 12px;
      padding: 8px 12px;
      background: var(--ri-accent-light);
      border: 1px solid #DBEAFE;
      border-radius: var(--ri-radius-sm);
    }

    .selected-chip.active {
      display: flex;
    }

    .chip-icon {
      font-size: 13px;
    }

    .chip-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--ri-accent);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chip-remove {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: none;
      background: rgba(29, 78, 216, 0.15);
      color: var(--ri-accent);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      flex-shrink: 0;
    }

    .chip-remove:hover {
      background: rgba(29, 78, 216, 0.25);
    }

    /* ── Run Button ── */
    .run-btn {
      width: 100%;
      padding: 12px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: #FFFFFF;
      background: linear-gradient(135deg, var(--ri-accent) 0%, #4338CA 100%);
      border: none;
      border-radius: var(--ri-radius-sm);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(29, 78, 216, 0.3);
    }

    .run-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(29, 78, 216, 0.4);
    }

    .run-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .run-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Loader ── */
    .loader-container {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      gap: 14px;
      background: var(--ri-surface);
      border: 1px solid var(--ri-border);
      border-radius: var(--ri-radius);
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--ri-border);
      border-top-color: var(--ri-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--ri-text-secondary);
    }

    .loader-subtext {
      font-size: 11px;
      color: #94A3B8;
      text-align: center;
      line-height: 1.4;
    }

    /* ── Results ── */
    #results-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }

    .results-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--ri-text-secondary);
    }

    .results-count {
      font-size: 10px;
      font-weight: 600;
      color: var(--ri-accent);
      background: var(--ri-accent-light);
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* ── Score Card (Collapsible) ── */
    .score-card {
      background: var(--ri-surface);
      border: 1px solid var(--ri-border);
      border-radius: var(--ri-radius-sm);
      overflow: hidden;
      box-shadow: var(--ri-shadow-sm);
      animation: cardIn 0.3s ease both;
    }

    .score-card+.score-card {
      margin-top: -1px;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s ease;
    }

    .card-header:hover {
      background: #F8F9FB;
    }

    .card-expand {
      font-size: 10px;
      color: #94A3B8;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .score-card.open .card-expand {
      transform: rotate(90deg);
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--ri-text);
      line-height: 1.3;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score-badge {
      flex-shrink: 0;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
    }

    .score-badge.positive {
      color: var(--ri-positive);
      background: var(--ri-positive-bg);
    }

    .score-badge.warning {
      color: var(--ri-warning);
      background: var(--ri-warning-bg);
    }

    .score-badge.negative {
      color: var(--ri-negative);
      background: var(--ri-negative-bg);
    }

    .card-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }

    .score-card.open .card-body {
      max-height: 300px;
    }

    .card-body-inner {
      padding: 0 12px 10px;
    }

    .card-snippet blockquote {
      margin: 0;
      padding: 6px 10px;
      font-size: 11px;
      font-style: italic;
      line-height: 1.45;
      color: var(--ri-text-secondary);
      background: var(--ri-bg);
      border-left: 2px solid var(--ri-border);
      border-radius: 0 4px 4px 0;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0 0;
      margin-top: 6px;
    }

    .card-location {
      font-size: 10px;
      color: var(--ri-text-secondary);
    }

    .card-link {
      font-size: 10px;
      font-weight: 600;
      color: var(--ri-accent);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .card-link:hover {
      color: var(--ri-accent-hover);
    }

    /* ── States ── */
    .state-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px;
      gap: 8px;
      background: var(--ri-surface);
      border: 1px solid var(--ri-border);
      border-radius: var(--ri-radius);
      text-align: center;
    }

    .state-icon {
      font-size: 28px;
      line-height: 1;
    }

    .state-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--ri-text);
    }

    .state-desc {
      font-size: 12px;
      color: var(--ri-text-secondary);
      line-height: 1.4;
    }

    .scanned-section {
      margin-top: 4px;
    }

    .scanned-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--ri-text-secondary);
      margin-bottom: 6px;
    }

    .scanned-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .scanned-chip {
      font-size: 10px;
      font-weight: 500;
      color: var(--ri-text-secondary);
      background: var(--ri-bg);
      border: 1px solid var(--ri-border);
      padding: 3px 8px;
      border-radius: 20px;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- Brand Header -->
    <div class="brand-header">
      <div class="brand-logo"></div>
      <div class="brand-text">
        <div class="brand-name">RI<span>FACTS</span></div>
        <div class="brand-tagline">Powered by RISE Project</div>
      </div>
    </div>

    <!-- Folder Search -->
    <div class="section" id="folder-section">
      <div class="section-label">Evidence Source</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="folder-search" class="search-input" type="text" placeholder="Search for a Drive folder…"
          autocomplete="off" />
      </div>
      <div id="selected-chip" class="selected-chip">
        <span class="chip-icon">📁</span>
        <span id="chip-name" class="chip-name"></span>
        <button id="chip-remove" class="chip-remove">✕</button>
      </div>
      <div id="search-results" class="search-results">
        <div class="search-hint">Type at least 2 characters to search</div>
      </div>
    </div>

    <!-- Action -->
    <button id="run-btn" class="run-btn" disabled>
      Verify Selected Claim
    </button>

    <!-- Loader -->
    <div id="loader" class="loader-container">
      <div class="spinner"></div>
      <div class="loader-text">Analyzing evidence…</div>
      <div class="loader-subtext">Scanning documents, spreadsheets, and media</div>
    </div>

    <!-- Results -->
    <div id="results-area"></div>

  </div>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
